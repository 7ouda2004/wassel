# ╔══════════════════════════════════════════════════════════╗
# ║              🌐 واصل - Wasel | Netlify Config           ║
# ║    Prosthetics & Orthoses Platform Deployment Settings   ║
# ╚══════════════════════════════════════════════════════════╝

[build]
  # Build command for Vite + React + TypeScript
  command = "npm run build"
  
  # Output directory where Vite generates the production bundle
  publish = "dist"

  # Node.js version for the build environment
  [build.environment]
    NODE_VERSION = "18"
    NPM_FLAGS = "--legacy-peer-deps"

# ─── SPA Routing ──────────────────────────────────────────
# Redirect all routes to index.html for React Router support
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ─── Security Headers ────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# ─── Cache Control for Static Assets ─────────────────────
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# ─── Performance Optimizations ────────────────────────────
[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true

[build.processing.images]
  compress = true
